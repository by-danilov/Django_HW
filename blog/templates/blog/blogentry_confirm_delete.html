{% extends 'base.html' %}
{% load static %}

{% block title %}Удаление записи{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">Удаление записи</h1>
    <p>Вы уверены, что хотите удалить запись "{{ object.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'blog:list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
