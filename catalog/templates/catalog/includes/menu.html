<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}">Django Каталог</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Продукты</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contacts' %}">Контакты</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link btn btn-sm btn-outline-info" href="{% url 'product_create' %}">Добавить продукт</a>
                </li>
                {% endif %}
            </ul>

            <ul class="navbar-nav ms-auto">

                        <a class="btn btn-sm btn-outline-secondary" href="{% url 'users:profile' %}">Профиль</a>

                            </button>
